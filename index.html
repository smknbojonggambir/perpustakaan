<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Library - SMKN Bojonggambir</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3a8a;
            --secondary: #3b82f6;
            --accent: #fbbf24;
            --bg: #f8fafc;
            --dark: #1e293b;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; }

        body { background-color: var(--bg); color: var(--dark); line-height: 1.6; }

        /* Header & Navigation */
        header {
            background: linear-gradient(rgba(30, 58, 138, 0.9), rgba(30, 58, 138, 0.9)), 
                        url('https://images.unsplash.com/photo-1507842217343-583bb7270b66?ixlib=rb-1.2.1&auto=format&fit=crop&w=1350&q=80');
            background-size: cover;
            background-position: center;
            color: white;
            padding: 60px 20px;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0% 100%);
        }

        .search-box {
            max-width: 800px;
            margin: 30px auto 0;
            display: flex;
            background: white;
            padding: 5px;
            border-radius: 50px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
        }

        .search-box input {
            flex: 1;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            outline: none;
            font-size: 1rem;
        }

        .search-box button {
            background: var(--secondary);
            color: white;
            border: none;
            padding: 0 30px;
            border-radius: 50px;
            cursor: pointer;
            transition: 0.3s;
        }

        .search-box button:hover { background: var(--primary); }

        /* Main Content */
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        .section-title {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 10px;
        }

        /* Book Cards */
        .book-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 25px;
        }

        .book-card {
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: 0.3s;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .book-card:hover { transform: translateY(-10px); box-shadow: 0 12px 20px rgba(0,0,0,0.1); }

        .book-card img {
            width: 100%;
            height: 280px;
            object-fit: cover;
        }

        .book-info { padding: 15px; flex-grow: 1; display: flex; flex-direction: column; }
        
        .book-tag {
            font-size: 0.7rem;
            background: #dcfce7;
            color: #166534;
            padding: 2px 8px;
            border-radius: 4px;
            width: fit-content;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: bold;
        }

        .book-title {
            font-weight: bold;
            font-size: 0.95rem;
            margin-bottom: 10px;
            color: var(--dark);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .btn-read {
            margin-top: auto;
            background: var(--primary);
            color: white;
            text-align: center;
            padding: 10px;
            text-decoration: none;
            border-radius: 6px;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .btn-read:hover { background: var(--secondary); }

        /* Loading Spinner */
        #loader {
            display: none;
            text-align: center;
            padding: 40px;
        }

        footer {
            background: var(--dark);
            color: white;
            padding: 40px 20px;
            text-align: center;
            margin-top: 60px;
        }

        @media (max-width: 600px) {
            .book-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); }
            header h1 { font-size: 1.5rem; }
            .search-box { flex-direction: column; border-radius: 20px; }
            .search-box input { border-radius: 20px 20px 0 0; }
            .search-box button { border-radius: 0 0 20px 20px; padding: 15px; }
        }
    </style>
</head>
<body>

    <header>
        <h1>Perpustakaan Digital SMKN Bojonggambir</h1>
        <p>Akses ke Jutaan Buku secara Gratis dan Legal</p>
        
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Ketik jurusan, judul buku, atau pengarang (Contoh: Teknik Mesin, Novel)...">
            <button onclick="searchGlobalBooks()"><i class="fas fa-search"></i> Cari</button>
        </div>
    </header>

    <div class="container">
        <!-- Koleksi Wajib SMK -->
        <div id="localSection">
            <div class="section-title">
                <h2><i class="fas fa-star text-warning" style="color: var(--accent);"></i> Buku Utama SMK</h2>
            </div>
            <div class="book-grid" id="localBookGrid">
                <!-- Diisi oleh JS -->
            </div>
        </div>

        <!-- Hasil Pencarian Global -->
        <div id="globalSection" style="margin-top: 50px;">
            <div class="section-title">
                <h2 id="globalTitle"><i class="fas fa-globe"></i> Rekomendasi Literasi Digital</h2>
            </div>
            <div id="loader"><i class="fas fa-spinner fa-spin fa-2x"></i><br><br>Mencari buku di database global...</div>
            <div class="book-grid" id="globalBookGrid">
                <!-- Hasil API masuk di sini -->
            </div>
        </div>
    </div>

    <footer>
        <p><strong>SMK Negeri Bojonggambir</strong></p>
        <p>Menuju Vokasi Berbasis Digital</p>
        <div style="margin-top: 20px; font-size: 0.8rem; opacity: 0.6;">
            Dihubungkan dengan Google Books API & Kemendikbud SIBI
        </div>
    </footer>

    <script>
        // 1. DATA BUKU UTAMA (Manual untuk kurikulum SMK)
        const localBooks = [
            { judul: "Informatika SMK Kelas X", cat: "TKJ/RPL", img: "https://buku.kemdikbud.go.id/assets/pelajaran/Informatika-BG-KLS-X.jpg", link: "https://buku.kemdikbud.go.id/katalog/informatika-untuk-smk-kelas-x" },
            { judul: "Dasar Teknik Otomotif", cat: "TSM/TKR", img: "https://buku.kemdikbud.go.id/assets/pelajaran/Dasar-dasar-Teknik-Otomotif-BS-KLS-X-1.jpg", link: "https://buku.kemdikbud.go.id/katalog/dasar-dasar-teknik-otomotif-semester-1" },
            { judul: "Dasar Akuntansi & Keuangan", cat: "AKL", img: "https://buku.kemdikbud.go.id/assets/pelajaran/Dasar-dasar-Akuntansi-dan-Keuangan-Lembaga-BS-KLS-X-1.jpg", link: "https://buku.kemdikbud.go.id/katalog/dasar-dasar-akuntansi-dan-keuangan-lembaga-semester-1" },
            { judul: "Bahasa Indonesia", cat: "WAJIB", img: "https://buku.kemdikbud.go.id/assets/pelajaran/Bahasa-Indonesia-BS-KLS-X.jpg", link: "https://buku.kemdikbud.go.id/katalog/Cerdas-Cergas-Berbahasa-dan-Bersastra-Indonesia-untuk-SMA-SMK-Kelas-X" },
            { judul: "Matematika SMK X", cat: "WAJIB", img: "https://buku.kemdikbud.go.id/assets/pelajaran/Matematika-BS-KLS-X.jpg", link: "https://buku.kemdikbud.go.id/katalog/matematika-untuk-smasmk-kelas-x" }
        ];

        // Tampilkan Buku Lokal
        function loadLocalBooks() {
            const grid = document.getElementById('localBookGrid');
            localBooks.forEach(book => {
                grid.innerHTML += createCard(book.judul, book.cat, book.img, book.link);
            });
        }

        function createCard(title, cat, img, link) {
            return `
                <div class="book-card">
                    <img src="${img}" alt="Cover" onerror="this.src='https://via.placeholder.com/200x280?text=Buku+SMK'">
                    <div class="book-info">
                        <span class="book-tag">${cat}</span>
                        <div class="book-title">${title}</div>
                        <a href="${link}" target="_blank" class="btn-read"><i class="fas fa-eye"></i> Baca Sekarang</a>
                    </div>
                </div>
            `;
        }

        // 2. FUNGSI PENCARIAN GLOBAL (API)
        async function searchGlobalBooks() {
            const query = document.getElementById('searchInput').value;
            const grid = document.getElementById('globalBookGrid');
            const loader = document.getElementById('loader');
            const title = document.getElementById('globalTitle');

            if (!query.trim()) return alert("Silakan ketik sesuatu untuk mencari...");

            grid.innerHTML = "";
            loader.style.display = "block";
            title.innerText = `Hasil Pencarian: "${query}"`;

            try {
                // Modifikasi: Menambahkan '&langRestrict=id' agar mayoritas hasil berbahasa Indonesia
                const response = await fetch(`https://www.googleapis.com/books/v1/volumes?q=${encodeURIComponent(query)}&langRestrict=id&maxResults=20&orderBy=relevance`);
                const data = await response.json();

                loader.style.display = "none";

                if (data.items && data.items.length > 0) {
                    data.items.forEach(item => {
                        const info = item.volumeInfo;
                        const bookTitle = info.title || "Judul Tidak Diketahui";
                        const cat = info.categories ? info.categories[0] : "Buku Umum";
                        // Memastikan link gambar menggunakan HTTPS agar tidak diblokir browser
                        let img = info.imageLinks ? info.imageLinks.thumbnail : "https://via.placeholder.com/200x280?text=No+Cover";
                        img = img.replace(/^http:\/\//i, 'https://'); 
                        const link = info.previewLink || "#"; 

                        grid.innerHTML += createCard(bookTitle, cat, img, link);
                    });
                } else {
                    grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: #64748b;'>Buku tidak ditemukan. Coba kata kunci yang lebih umum.</p>";
                }
            } catch (error) {
                console.error("Error:", error);
                loader.style.display = "none";
                grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center; color: #ef4444;'>Gagal mengambil data dari internet. Periksa koneksi Anda.</p>";
            }
        }

        // Fitur tambahan: Memungkinkan pencarian dengan menekan tombol "Enter" di keyboard
        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') {
                searchGlobalBooks();
            }
        });

        // Jalankan saat load awal
        window.onload = () => {
            loadLocalBooks();
            // Default search agar halaman tidak kosong
            document.getElementById('searchInput').value = "Teknologi Informasi";
            searchGlobalBooks();
        };
    </script>
</body>
</html>
