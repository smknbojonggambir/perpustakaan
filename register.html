<!DOCTYPE html>
<html lang="id" class="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registrasi - Digital Library SMKN Bojonggambir</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-slate-50 dark:bg-slate-900 text-slate-800 dark:text-slate-100 min-h-screen flex items-center justify-center p-4">

  <div class="w-full max-w-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl p-8 shadow-2xl space-y-6">
    <div class="text-center space-y-2">
      <h2 class="text-2xl font-bold text-slate-900 dark:text-white">Daftar Akun Baru</h2>
      <p class="text-xs text-slate-500">Bergabung dengan Perpus Digital SMKN Bojonggambir</p>
    </div>

    <form id="regForm" class="space-y-4">
      <div>
        <label class="block text-xs font-semibold mb-1">Nama Lengkap</label>
        <input type="text" id="nama" required placeholder="Nama Lengkap Siswa/Guru" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-sm">
      </div>
      <div>
        <label class="block text-xs font-semibold mb-1">Email Sekolah / Pribadi</label>
        <input type="email" id="email" required placeholder="nama@smknbojonggambir.sch.id" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-sm">
      </div>
      <div>
        <label class="block text-xs font-semibold mb-1">Peran / Status</label>
        <select id="role" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-sm">
          <option value="Anggota">Siswa</option>
          <option value="Guru">Guru / Staff</option>
        </select>
      </div>
      <div>
        <label class="block text-xs font-semibold mb-1">Kata Sandi</label>
        <input type="password" id="password" required placeholder="••••••••" class="w-full px-4 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 bg-slate-50 dark:bg-slate-900 text-sm">
      </div>

      <button type="submit" class="w-full py-3 bg-sky-600 text-white font-semibold rounded-xl hover:bg-sky-700 transition text-sm">Daftar Akun</button>
    </form>

    <p class="text-center text-xs text-slate-500">
      Sudah punya akun? <a href="login.html" class="text-sky-600 font-semibold hover:underline">Masuk</a>
    </p>
  </div>

  <script src="assets/js/api.js"></script>
  <script src="assets/js/main.js"></script>
</body>
</html>
